<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的H5页面</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .title {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .image {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        .description {
            font-size: 18px;
            line-height: 1.5;
            text-align: center;
            margin-bottom: 20px;
        }
        .button {
            display: block;
            margin: 0 auto;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .timer {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }
        @media only screen and (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .title {
                font-size: 24px;
            }
            .description {
                font-size: 16px;
            }
            .button {
                font-size: 16px;
                padding: 8px 16px;
            }
            .timer {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title" >居住证办理管理</h1>
    <img class="image" src="./img/fig4.png" alt="图片">
</div>
<div class="container">
    <div>

    </div>
    <h4 class="title">办理服务</h4>
    <div id="image-container">
        <div>
            <h6>居住登记</h6>
            <img class="image" src="./img/fig1.png">
        </div>
        <div>
            <h6>办理居住证</h6>
            <img class="image" src="./img/fig2.png">
        </div>
        <div>
            <h6>居住证挂失申请</h6>
            <img class="image" src="./img/fig3.png">
        </div>
        <div>
            <h6>地址变更等级</h6>
            <img class="image" src="./img/fig4.png">
        </div>
    </div>
</div>
<script>
</script>
</body>
</html>
